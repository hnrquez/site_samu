<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página Não 🧸</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #000000, #000000);
    text-align: center;
    color: white;
}

.container {
    width: 90%;
    max-width: 400px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
}

h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

img {
    width: 100%;
    max-width: 250px;
    border-radius: 15px;
}

/* MEDIA QUERY CELULAR */
@media (max-width: 480px) {
    .container {
        width: 95%;
        padding: 15px;
    }

    h1 {
        font-size: 18px;
    }

    img {
        max-width: 180px;
    }
}

/* MEDIA QUERY TABLET */
@media (max-width: 768px) {
    .container {
        width: 85%;
    }

    h1 {
        font-size: 20px;
    }

    img {
        max-width: 220px;
    }
}

/* DESKTOP GRANDE */
@media (min-width: 1024px) {
    .container {
        max-width: 500px;
        padding: 30px;
    }

    h1 {
        font-size: 28px;
    }

    img {
        max-width: 300px;
    }
}
</style>
</head>
<body>
<div class="container">
    <h1>ENTÃO MORRA, SEJA FELIZ COM SEU AMANTE</h1>
    <img src="/site_para_samuka/img/bozo.jpg" alt="bozonaro">
</div>
</body>
</html>
