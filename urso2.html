<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quando estiver com desejo</title>
    <audio src="/site_para_samuka/Download (14).mp3" autoplay hidden loop></audio>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
      <source src="img/videoplayback.mp4" type="video/mp4">
   </video>
   <div>
     <h1>Você merece todo carinho do mundo. Nunca esqueça disso 💙</h1>
   </div>
   
   <style>
    *{
        margin: 0%;
        padding:0%;
        box-sizing: border-box;
    }
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-family: "Oswald", sans-serif;
                 font-family: "Crimson Text", serif;
                 font-weight: 700;
                 font-style: italic;
     
    }
    div{
        width: 50%;
        height: 35%;
        max-width: 100%;
        display: flex;
    }
    #bg-video {
     position: fixed; /* fixa no fundo */
     top: 0;
     left: 0;
     width: 100%;
     height: 100%;
     object-fit: cover; /* cobre a tela inteira */
     z-index: -1; /* fica atrás de tudo */
    }
    @media (max-width: 480px) {
       div {
        width: 90%;   /* ocupa mais espaço */
         height: auto; /* evita ficar apertado */
         flex-direction: column;
         padding: 15px;
        }

     body {
         padding: 10px;
        }
    }
    @media (max-width: 768px) {
        div {
            width: 70%;
            height: auto;
        }
    }
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap');
    

       
   </style>
