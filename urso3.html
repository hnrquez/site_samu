<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motivador</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, Helvetica, sans-serif;

    /* 🌈 FUNDO BONITINHO */
    
}

/* Caixa central */
.container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 400px;
    color: rgb(0, 0, 0);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Botão */
button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #8d767a;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #696063;
}

/* Mensagem */
#msg {
    margin-top: 20px;
    font-size: 18px;
    min-height: 50px;
    transition: 0.3s;
}
    #bg-video {
     position: fixed; /* fixa no fundo */
     top: 0;
     left: 0;
     width: 100%;
     height: 100%;
     object-fit: cover; /* cobre a tela inteira */
     z-index: -1; /* fica atrás de tudo */
    }
</style>
</head>

<body>

<div class="container">
    <h1>Ursinho Motivador</h1>
    <p>Clica ai princeso 💙</p>

    <button onclick="sortear()">Clique aqui</button>
    <p id="msg"></p>
</div>

<script>
function sortear() {
  let mensagens = [
    "Você é incrível 💙",
    "Nunca duvide de você ✨",
    "Eu tenho orgulho de você 🧸",
    "Você é mais forte do que pensa 💪",
    "Seu sorriso muda tudo 😊",
    "Você faz diferença na vida das pessoas 💖"
  ];

  let sorteio = Math.floor(Math.random() * mensagens.length);
  document.getElementById("msg").innerText = mensagens[sorteio];
}
</script>
    <video autoplay muted loop id="bg-video">
      <source src="img/videoplayback.mp4" type="video/mp4">
   </video>
</body>
</html>
